# 构建配置兜底（当无法从官方获取时）
build_configs:
  # 通用默认配置
  default:
    SCITER_RUST_VERSION: "1.75"
    RUST_VERSION: "1.75"
    MAC_RUST_VERSION: "1.81"
    CARGO_NDK_VERSION: "3.1.2"
    SCITER_ARMV7_CMAKE_VERSION: "3.29.7"
    SCITER_NASM_DEBVERSION: "2.15.05-1"
    LLVM_VERSION: "15.0.6"
    FLUTTER_VERSION: "3.24.5"
    ANDROID_FLUTTER_VERSION: "3.24.5"
    FLUTTER_ELINUX_VERSION: "3.16.9"
    VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
    ARMV7_VCPKG_COMMIT_ID: "6f29f12e82a8293156836ad81cc9bf5af41fe836"
    NDK_VERSION: "r28c"
    BRIDGE_FLUTTER_VERSION: "3.22.3"
    FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
    CARGO_EXPAND_VERSION: "1.0.95"

  # 版本特定配置（如果已知）
  version_specific:
    "1.4.7":
      NDK_VERSION: "r28c"
      FLUTTER_VERSION: "3.24.5"
    "1.4.6":
      NDK_VERSION: "r27c"
      FLUTTER_VERSION: "3.24.5"
    "1.4.5":
      NDK_VERSION: "r27c"
      FLUTTER_VERSION: "3.24.5"

  # 平台特定配置
  platform_specific:
    android:
      # Android 使用 ANDROID_FLUTTER_VERSION
      flutter_version_key: "ANDROID_FLUTTER_VERSION"
      critical_vars:
        - "NDK_VERSION"
        - "ANDROID_FLUTTER_VERSION"
    windows:
      critical_vars:
        - "VCPKG_COMMIT_ID"
        - "SCITER_NASM_DEBVERSION"
    macos:
      # macOS 使用 MAC_RUST_VERSION
      rust_version_key: "MAC_RUST_VERSION"
      critical_vars:
        - "MAC_RUST_VERSION"
    linux:
      critical_vars:
        - "FLUTTER_RUST_BRIDGE_VERSION"

# 元数据
metadata:
  last_updated: "2026-06-23"
  source: "manual curation based on RustDesk official releases"
  maintainer: "RDGen"
  notes: |
    This file serves as a fallback when GitHub API is unavailable.
    Update this file when new RustDesk versions are released.
    For version-specific build configs, check RustDesk official repository:
    https://github.com/rustdesk/rustdesk/blob/master/.github/workflows/flutter-build.yml
